name: validate-landing

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/validate-landing.yml'
      - '.github/workflows/deploy-landing.yml'
      - '_quarto.yml'
      - 'data/**'
      - 'img/**'
      - 'requirements*.txt'
      - 'scripts/**'
      - 'templates/**'
      - 'styles.css'
      - 'README.md'
      - 'tests/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    env:
      QUARTO_VERSION: '1.3.340'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: ${{ env.QUARTO_VERSION }}

      - name: Render landing
        run: quarto render

      - name: Assert rendered output has no raw data references
        run: |
          set -euo pipefail

          if [ -d "_site/data" ]; then
            echo "Unexpected _site/data directory found."
            exit 1
          fi

          if grep -En 'data/|landing\.yml|instances\.yml' _site/index.html; then
            echo "Unexpected raw data reference found in _site/index.html."
            exit 1
          fi

      - name: Run tests
        run: python -m pytest -q
