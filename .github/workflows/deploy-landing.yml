name: deploy-landing

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-landing.yml'
      - '_quarto.yml'
      - 'data/**'
      - 'img/**'
      - 'requirements.txt'
      - 'scripts/**'
      - 'templates/**'
      - 'styles.css'
      - 'README.md'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    concurrency:
      group: deploy-gh-pages
      cancel-in-progress: true
    env:
      QUARTO_VERSION: '1.3.340'

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: ${{ env.QUARTO_VERSION }}

      - name: Render landing
        run: quarto render

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 1

      - name: Publish landing root files
        run: |
          set -euo pipefail

          # Copy only known root files. Never use root-level --delete sync because
          # gh-pages also stores release instance directories (e.g. 0000/, 2505/).
          cp _site/index.html gh-pages/index.html
          cp _site/styles.css gh-pages/styles.css

          # Mirror landing-owned asset directories.
          for d in site_libs index_files img; do
            if [ -d "_site/$d" ]; then
              mkdir -p "gh-pages/$d"
              rsync -a --delete "_site/$d/" "gh-pages/$d/"
            else
              rm -rf "gh-pages/$d"
            fi
          done

          # Remove previously leaked raw config artifacts.
          rm -rf gh-pages/data
          rm -f gh-pages/index.md gh-pages/_config.yml
          touch gh-pages/.nojekyll

          # Deploy safety assertions.
          if [ -d gh-pages/data ]; then
            echo "Unexpected gh-pages/data directory still present."
            exit 1
          fi

          if find gh-pages -maxdepth 1 -type f \( -name '*.yml' -o -name '*.yaml' \) | grep -q .; then
            echo "Unexpected YAML files at gh-pages root:"
            find gh-pages -maxdepth 1 -type f \( -name '*.yml' -o -name '*.yaml' \)
            exit 1
          fi

      - name: Commit and push
        run: |
          set -euo pipefail
          cd gh-pages

          git config user.email "do_not_email@example.com"
          git config user.name "gh_action"

          git add index.html styles.css .nojekyll
          for path in site_libs index_files img; do
            if [ -e "$path" ]; then
              git add --all "$path"
            fi
          done
          git add -u

          if git diff --cached --quiet; then
            echo "No landing changes to publish."
            exit 0
          fi

          git commit -m "Update landing page from main at $(date +%Y%m%d-%H%M%S)"
          git push origin HEAD:gh-pages
