name: deploy-landing

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-landing.yml'
      - '_quarto.yml'
      - 'data/**'
      - 'img/**'
      - 'scripts/**'
      - 'templates/**'
      - 'styles.css'
      - 'README.md'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    concurrency:
      group: deploy-gh-pages
      cancel-in-progress: true

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Generate landing page from data
        run: python scripts/generate_landing.py

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.3.340

      - name: Render landing
        run: quarto render

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 1

      - name: Publish landing root files
        run: |
          set -euo pipefail

          rsync -a _site/index.html gh-pages/index.html
          rsync -a _site/styles.css gh-pages/styles.css

          if [ -d "_site/site_libs" ]; then
            rsync -a _site/site_libs/ gh-pages/site_libs/
          fi

          if [ -d "_site/img" ]; then
            rsync -a _site/img/ gh-pages/img/
          fi

          mkdir -p gh-pages/data
          cp data/landing.yml gh-pages/data/landing.yml
          cp data/instances.yml gh-pages/data/instances.yml

          rm -f gh-pages/index.md gh-pages/_config.yml
          touch gh-pages/.nojekyll

      - name: Commit and push
        run: |
          set -euo pipefail
          cd gh-pages

          git config user.email "do_not_email@example.com"
          git config user.name "gh_action"

          git add index.html styles.css site_libs img data .nojekyll
          git add -u

          if git diff --cached --quiet; then
            echo "No landing changes to publish."
            exit 0
          fi

          git commit -m "Update landing page from main at $(date +%Y%m%d-%H%M%S)"
          git push origin HEAD:gh-pages
